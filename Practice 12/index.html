<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
  <!--   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> -->
</head>
<body>
    <div class="container">
     <div class="badge">
     </div>
     <h2>Registration Portal</h2>
     <p> Registration Portal</p>
    <form>
        <div class="input-group">
        <i class="fa fa-user"></i>
        <input type="text" class="name" placeholder="Full Name" required>
        </div>
        <div class="input-group">
            <i class="fa fa-badge"></i>
        </div>
        <div class="input-group">
        <i class="fa fa-password"></i>
        <input type="password" class="password" placeholder="password" required autocomplete="current-password">
        </div>
            <div class="input-group">
        <i class="fa fa-email"></i>
        <input type="text" class="name " placeholder="Email-Address" required>
        </div>
            <div class="input">
        <i class="fa fa-login"></i>
        <input type="text" class="name" placeholder="Login" required>
         </div>
         <div class="input">
        <button type="submit">Submit</button>
        </div>
    </form>
    <div class="output">
    <select name="Country" class="Country">
        <option value="Select Country">Select Country</option>
         <option value="">Kenya</option>
          <option value="">Uganda</option>
           <option value="">Somalia</option>
            <option value="">Tanzania</option>
    </select></div>
     <div class="output">
    <select name="County" class="County">
        <option value="Select County">Select County</option>
         <option value="">Siaya</option>
          <option value="">Kisumu</option>
           <option value="">Mombasa</option>
            <option value="">Migori</option>
    </select></div>
    <div class="nav">
        <input type="radio" class="male" >Male
    </div>
    <div class="Tav">
        <input type="radio" class="female" >Female
    </div>
    <div class="inouput">
        <input type="checkbox" class="age">20-30
         <input type="checkbox" class="age">30-40
          <input type="checkbox" class="age">40-50
           <input type="checkbox" class="age">50-60
            <input type="checkbox" class="age">60-70
    </div>
    </div>
    <hr>
<script src="main.js"></script>
</body>
</html>
